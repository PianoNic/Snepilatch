name: Build and Release Flutter Apps

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
          cache: true

      - name: Setup release keystore
        working-directory: ./snepilatch/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Setting up release keystore from secrets..."
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using existing keystore from secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > app-release.jks
          else
            echo "Generating new keystore (consider storing it as KEYSTORE_BASE64 secret)"
            keytool -genkey -v -keystore app-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias snepilatch \
              -dname "CN=Snepilatch App, OU=Development, O=Snepilatch, L=Ruebliland, S=Aargau, C=CH" \
              -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" -noprompt
          fi

      - name: Create key.properties
        working-directory: ./snepilatch/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Creating key.properties file..."
          cat > key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=snepilatch
          storeFile=app-release.jks
          EOF

      - name: Get dependencies
        working-directory: ./snepilatch
        run: flutter pub get

      - name: Generate app icons
        working-directory: ./snepilatch
        run: dart run flutter_launcher_icons -f flutter_launcher_icons-prod.yaml

      - name: Build Android APK
        working-directory: ./snepilatch
        env:
          SENTRY_DSN: ${{ vars.SENTRY_URL }}
        run: |
          flutter build apk --release \
            --flavor prod \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}" \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_RELEASE="${{ github.ref_name }}" \
            --dart-define=SENTRY_ENVIRONMENT="production"

      - name: Prepare artifacts
        working-directory: ./snepilatch
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-prod-release.apk artifacts/snepilatch-${{ github.ref_name }}.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: snepilatch/artifacts/

  upload-to-release:
    needs: [build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-build/snepilatch-${{ github.ref_name }}.apk
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Skip if webhook URL is not configured
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL not set, skipping Discord notification"
            exit 0
          fi

          # Fetch release data from GitHub API
          RELEASE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO_NAME/releases/tags/$RELEASE_TAG")

          # Validate release data was fetched successfully
          if [ "$(echo "$RELEASE_DATA" | jq -r '.message // empty')" = "Not Found" ]; then
            echo "::error::Could not fetch release data for tag $RELEASE_TAG"
            exit 1
          fi

          # Export release info for Python script
          export RELEASE_BODY=$(echo "$RELEASE_DATA" | jq -r '.body // ""')
          export RELEASE_URL=$(echo "$RELEASE_DATA" | jq -r '.html_url // ""')
          export RELEASE_PUBLISHED=$(echo "$RELEASE_DATA" | jq -r '.published_at // ""')

          # Extract direct APK download URL from release assets
          export APK_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url // empty')

          # Build Discord embed payload
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          import re
          from datetime import datetime

          release_body = os.environ.get('RELEASE_BODY', '')
          release_tag = os.environ.get('RELEASE_TAG', '')
          release_url = os.environ.get('RELEASE_URL', '')
          release_published = os.environ.get('RELEASE_PUBLISHED', '')
          apk_url = os.environ.get('APK_URL', '')
          repo_name = os.environ.get('REPO_NAME', '')

          # Clean the release body for the embed description:
          # - Strip the "## What's Changed" header
          # - Strip the "Full Changelog" link
          # - Strip the auto-update note (shown separately in embed footer)
          # - Trim excess whitespace
          # This lets release-drafter's markdown pass through directly,
          # so any category changes in release-drafter.yml are automatically reflected.
          description = release_body
          description = description.replace('\r\n', '\n')
          description = re.sub(r"^## What's Changed\n*", '', description, flags=re.MULTILINE)
          description = re.sub(r'\*\*Full Changelog[:\*].*', '', description, flags=re.DOTALL)
          description = re.sub(r'📝 \*\*Note:\*\*.*\n*', '', description)
          description = description.strip()

          if not description:
              description = 'See release notes for details.'

          # Append auto-update note and spacing before the fields
          description += '\n\n> 📝 If you\'re on **v0.4.0+**, the app will auto-update when you open it!'

          # Truncate to Discord embed description limit (4096 chars)
          if len(description) > 4000:
              description = description[:3997] + '...'

          # Build embed fields
          fields = []

          if apk_url:
              fields.append({
                  "name": "📥 Download APK",
                  "value": f"[snepilatch-{release_tag}.apk]({apk_url})",
                  "inline": True
              })

          fields.append({
              "name": "📋 Release Notes",
              "value": f"[View on GitHub]({release_url})",
              "inline": True
          })

          # Build thumbnail URL from repo icon and banner from repo social preview
          icon_url = f"https://raw.githubusercontent.com/{repo_name}/main/assets/snepilatch_Logo.png"
          banner_url = "https://repository-images.githubusercontent.com/1048941028/0f6a518b-1c90-492c-be39-3eba2a3cab99"

          # Build the timestamp from published_at
          timestamp = release_published if release_published else datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

          payload = {
              "content": "||@everyone||",
              "allowed_mentions": {
                  "parse": ["everyone"]
              },
              "embeds": [{
                  "title": f"📱 New Release — {release_tag}",
                  "description": description,
                  "url": release_url,
                  "color": 0x1DB954,
                  "fields": fields,
                  "thumbnail": {
                      "url": icon_url
                  },
                  "image": {
                      "url": banner_url
                  },
                  "footer": {
                      "text": "Thanks for your support! 🎵"
                  },
                  "timestamp": timestamp
              }]
          }

          with open('discord_payload.json', 'w') as f:
              json.dump(payload, f)
          PYTHON_SCRIPT

          # Send to Discord and check response
          HTTP_CODE=$(curl -s -o discord_response.txt -w "%{http_code}" \
               -H "Content-Type: application/json" \
               -d @discord_payload.json \
               "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_CODE" -ne 204 ] && [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Discord webhook returned HTTP $HTTP_CODE"
            cat discord_response.txt
            exit 1
          fi

          echo "Discord notification sent successfully (HTTP $HTTP_CODE)"